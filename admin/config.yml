backend:
  name: git-gateway
  branch: master
#

publish_mode: editorial_workflow

# backend:
#   name: github
#   repo: Pageboy/pageboy.github.io # Path to your GitHub repository
#

# This line should *not* be indented
media_folder: "_uploads" # Media files will be stored in the repo under images/uploads
public_folder: /uploads

collections:
  - name: "posts" # Used in routes, e.g., /admin/collections/blog
    label: "Posts" # Used in the UI
    label_singular: "Post"
    folder: "_posts/" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    path: '{{year}}/{{slug}}'
    media_folder: "/_uploads"
    public_folder: "/uploads"
    fields: # The fields for each document, usually in front matter
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Image", name: "header_feature_image", widget: "image", required: false}
